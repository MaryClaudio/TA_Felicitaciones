<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi novio hermoso ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ffe3e3, #fcc2d7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor del sobre */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            animation: flotarSobre 3s ease-in-out infinite;
            z-index: 10;
        }

        .envelope {
            position: relative;
            width: 320px;
            height: 200px;
            background-color: #f03e3e;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        /* Solapa del sobre */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 110px solid #c92a2a;
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 3;
        }

        /* Efecto de apertura de la solapa */
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* El corazón que sella el sobre */
        .heart-seal {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            font-size: 50px;
            z-index: 4;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .envelope.open .heart-seal {
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
        }

        /* Texto indicador */
        .indicador {
            position: absolute;
            bottom: -45px;
            width: 100%;
            text-align: center;
            color: #c92a2a;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .envelope.open + .indicador {
            opacity: 0;
        }

        /* La Carta Secreta */
        .card {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(0) scale(0.85);
            bottom: 10px;
            background: #fff0f6;
            width: 290px;
            padding: 20px 0; 
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            z-index: 2;
            border: 2px dashed #ff8787;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animación para que la carta se desplace hacia abajo */
        .envelope.open .card {
            opacity: 1;
            transform: translateX(-50%) translateY(205px) scale(1.05); 
            z-index: 5;
        }

        /* Imagen de la pareja */
        .couple-img {
            max-width: 90%;
            height: auto;
            border-radius: 12px;
            border: 2px solid #ffb3c6;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            object-fit: cover;
        }

        /* Estilo para el título del mensaje */
        .message-title {
            color: #d6336c;
            font-size: 19px;
            margin: 5px 0 10px 0;
        }

        /* Estilo para el cuerpo del mensaje */
        .message-body {
            color: #495057;
            font-size: 13.5px;
            line-height: 1.5;
            margin-bottom: 15px;
            max-width: 85%;
        }

        /* Botón de Beso */
        .kiss-btn {
            background-color: #ff708e;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 112, 142, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kiss-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(255, 112, 142, 0.4);
        }

        .kiss-btn:active {
            transform: scale(0.95);
        }

        .kiss-icon {
            font-size: 18px;
        }

        /* Partículas de besos volando */
        .besito-particle {
            position: absolute;
            font-size: 45px;
            pointer-events: none;
            z-index: 9999;
            animation: volarBesito 1.2s ease-out forwards;
        }

        @keyframes volarBesito {
            0% {
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.5) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* Animaciones estéticas generales */
        @keyframes flotarSobre {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .corazon-flotante {
            position: absolute;
            color: #ff8787;
            font-size: 20px;
            animation: lluvia 4s linear infinite;
            bottom: -50px;
            opacity: 0;
            z-index: 1;
        }

        @keyframes lluvia {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            15% { opacity: 0.8; }
            100% { transform: translateY(-105vh) rotate(360deg) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="abrirCarta()">
        <div class="envelope" id="sobre">
            <div class="heart-seal">❤️</div>
            
            <!-- CONTENIDO DE LA CARTA -->
            <div class="card" id="carta" onclick="event.stopPropagation();">
                <!-- Tu foto de pareja con el nombre correcto -->
                <img src="imagen-01.png" alt="Nosotros" class="couple-img">
                
                <h1 class="message-title">Para el amor de mi vida ✨</h1>
                <p class="message-body">Quería recordarte lo increíblemente feliz que me siento a tu lado. Cada momento juntos es un regalo hermoso y me llena el corazón. Sé que vamos a lograr muchísimas cosas maravillosas juntos. ¡Te amo mucho mucho mucho! 💖</p>
                
                <!-- Botón interactivo de besos -->
                <button class="kiss-btn" onclick="lanzarBesos(event)">
                    <span class="kiss-icon">💋</span> ¡Dame un besito!
                </button>
            </div>
        </div>
        <div class="indicador">👉 ¡HAZ CLIC PARA ABRIR! 👈</div>
    </div>

    <!-- Música de fondo: Melodía romántica y dulce de piano -->
    <audio id="musica" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop></audio>

    <script>
        function abrirCarta() {
            const sobre = document.getElementById('sobre');
            
            if(sobre.classList.contains('open')) return;

            sobre.classList.add('open');

            const musica = document.getElementById('musica');
            musica.volume = 0.4; 
            musica.play().catch(err => console.log("Auto-play bloqueado por el navegador."));

            setInterval(crearCorazon, 400);
        }

        function lanzarBesos(event) {
            const x = event.clientX;
            const y = event.clientY;

            for (let i = 0; i < 15; i++) {
                const besito = document.createElement('div');
                besito.classList.add('besito-particle');
                besito.innerText = '💋';
                besito.style.left = x + 'px';
                besito.style.top = y + 'px';

                const dx = (Math.random() - 0.5) * 350 + 'px';
                const dy = (Math.random() - 0.7) * 350 - 50 + 'px'; 
                const rot = (Math.random() - 0.5) * 120 + 'deg';

                besito.style.setProperty('--dx', dx);
                besito.style.setProperty('--dy', dy);
                besito.style.setProperty('--rot', rot);

                document.body.appendChild(besito);

                setTimeout(() => {
                    besito.remove();
                }, 1200);
            }
        }

        function crearCorazon() {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon-flotante');
            
            const iconos = ['❤️', '💖', '🌸', '✨', '💕'];
            corazon.innerText = iconos[Math.floor(Math.random() * iconos.length)];
            
            corazon.style.left = Math.random() * 100 + 'vw';
            corazon.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
            document.body.appendChild(corazon);

            setTimeout(() => {
                corazon.remove();
            }, 4000);
        }
    </script>
</body>
</html>
